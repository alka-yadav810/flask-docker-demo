name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      run: docker build -t shreejaadmin/flask-docker-demo:latest .

    - name: Push Docker Image
      run: docker push shreejaadmin/flask-docker-demo:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker stop flask-app || true
          docker rm flask-app || true
          docker pull shreejaadmin/flask-docker-demo:latest
          docker run -d -p 80:5000 --name flask-app shreejaadmin/flask-docker-demo:latest
